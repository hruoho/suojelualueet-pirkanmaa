{{ define "main" }}
<div class="kohteet-page">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
    <div class="kunta-description">{{ . }}</div>
  {{ end }}
  {{ $kunta := .Title }}
  {{ $pages := where site.RegularPages "Params.kunta" $kunta }}
  {{ with $pages }}
  <h2>Kohteet ({{ len . }})</h2>
  <div class="kohteet-grid">
    {{ range . }}
      {{ partial "kohde-card.html" . }}
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
