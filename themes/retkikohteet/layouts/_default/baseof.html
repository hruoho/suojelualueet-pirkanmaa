<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  {{ $style := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}" type="text/css" integrity="{{ $style.Data.Integrity }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <nav class="site-nav">
    <a href="{{ "/" | relURL }}" class="site-nav__home">Suojelualueet — Pirkanmaa</a>
  </nav>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>&copy; {{ now.Year }} Suojelualueet — Pirkanmaa</p>
  </footer>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
